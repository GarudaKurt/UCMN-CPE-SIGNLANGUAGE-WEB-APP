<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sign Language Bridge</title>
      <!-- Bootstrap 5 -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <!-- Fonts -->
      <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
      <style>
         :root {
         --ink: #0f0f13;
         --paper: #f5f4ef;
         --accent: #e84d3d;
         --ble-blue: #2563eb;
         --mic-green: #16a34a;
         --warn: #d97706;
         }
         body {
         font-family: 'Sora', sans-serif;
         background: var(--paper);
         color: var(--ink);
         }
         /* Topbar */
         .topbar {
         background: var(--ink);
         color: white;
         border-bottom: 3px solid var(--accent);
         }
         .mono {
         font-family: 'Space Mono', monospace;
         }
         /* Gesture display */
         .gesture-display {
         min-height: 140px;
         display: flex;
         align-items: center;
         justify-content: center;
         background: var(--ink);
         color: white;
         font-size: 2rem;
         font-weight: 700;
         text-align: center;
         padding: 1.5rem;
         }
         .gesture-display.flash {
         animation: flash 0.6s ease;
         }
         @keyframes flash {
         0% { background: var(--ble-blue); }
         100% { background: var(--ink); }
         }
         /* Output textarea */
         .output-box {
         background: var(--paper);
         border: 2px solid var(--ink);
         font-family: 'Space Mono', monospace;
         }
         /* Activity log */
         .log-body {
         height: 160px;
         overflow-y: auto;
         background: #0f1117;
         color: #a3e635;
         font-family: 'Space Mono', monospace;
         font-size: 0.8rem;
         padding: 10px;
         }
         .mic-dot {
         width: 8px;
         height: 8px;
         background: var(--mic-green);
         border-radius: 50%;
         display: inline-block;
         margin-right: 6px;
         animation: pulse 1.5s infinite;
         }
         @keyframes pulse {
         0%,100% { transform: scale(1); }
         50% { transform: scale(1.4); }
         }
      </style>
   </head>
   <body>
      <!-- Top Bar -->
      <nav class="topbar navbar px-4">
         <span class="navbar-brand mono fw-bold text-white">
         🤟 Sign Language Bridge
         </span>
         <span id="blePill"
            class="badge bg-secondary mono"
            >
         <span id="bleLabel">
         BLE Disconnected
         </span>
         </span>
      </nav>
      <div class="container py-4">
         <div class="row g-4">
            <!-- Voice Panel -->
            <div class="col-lg-6">
               <div class="card border-dark shadow-sm">
                  <div class="card-header fw-bold">
                     🎤 Voice Input
                     <span class="text-muted small float-end mono">
                     mic → esp32
                     </span>
                  </div>
                  <div class="card-body">
                     <textarea
                        id="voiceText"
                        class="form-control output-box"
                        rows="6"
                        placeholder="Waiting for speech..."
                        readonly
                        ></textarea>
                     <div class="small text-muted mt-2 mono">
                        <span class="mic-dot"></span>
                        Microphone active — speaking sends text to ESP32
                     </div>
                  </div>
               </div>
            </div>
            <!-- Gesture Panel -->
            <div class="col-lg-6">
               <div class="card border-dark shadow-sm">
                  <div class="card-header fw-bold">
                     🖐️ Gesture Output
                     <span class="text-muted small float-end mono">
                     esp32 → tts
                     </span>
                  </div>
                  <div class="card-body">
                     <div
                        class="gesture-display mb-3"
                        id="gestureDisplay"
                        >
                        <span id="gestureIdle"
                           class="text-secondary fs-6">
                        Waiting for gesture...
                        </span>
                        <span id="gestureText"
                           style="display:none;">
                        </span>
                     </div>
                     <button
                        class="btn btn-dark w-100 mono fw-bold"
                        id="speakBtn"
                        disabled
                        onclick="speakGesture()"
                        >
                     🔊 Speak Again
                     </button>
                  </div>
               </div>
            </div>
            <!-- Activity Log -->
            <div class="col-12">
               <div class="card border-dark">
                  <div class="card-header fw-bold">
                     Activity Log
                     <span class="text-muted small float-end mono">
                     real-time
                     </span>
                  </div>
                  <div
                     class="log-body"
                     id="logBody"
                     >
                     <div>System initialized...</div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>
         let currentGesture = "";
         
         function log(msg) {
           const el = document.createElement("div");
           el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
           const body = document.getElementById("logBody");
           body.appendChild(el);
           body.scrollTop = body.scrollHeight;
         }
         
         function updateBLEStatus(status) {
           const pill  = document.getElementById("blePill");
           const label = document.getElementById("bleLabel");
           const map = { disconnected:"secondary", scanning:"warning", not_found:"danger", connected:"success" };
           pill.className = "badge bg-" + (map[status] || "secondary") + " mono";
           label.textContent = status.replace("_", " ");
           log(`BLE: ${status}`);                          // ← was missing
         }
         
         function showGesture(text) {
           currentGesture = text;
           const display = document.getElementById("gestureDisplay");
           document.getElementById("gestureIdle").style.display = "none";
           const gest = document.getElementById("gestureText");
           gest.style.display = "";
           gest.textContent = text;
           display.classList.remove("flash");
           void display.offsetWidth;
           display.classList.add("flash");
           document.getElementById("speakBtn").disabled = false;
           log(`Gesture: "${text}"`);                      // ← was missing
         }
         
         function resetGesture() {
           currentGesture = "";
           document.getElementById("gestureIdle").style.display = "";
           document.getElementById("gestureText").style.display = "none";
           document.getElementById("speakBtn").disabled = true;
           log("Gesture reset — ready.");                  // ← was missing
         }
         
         async function speakGesture() {
           if (!currentGesture) return;
           const btn = document.getElementById("speakBtn");
           btn.disabled = true;
           btn.textContent = "🔊 Speaking…";
           await fetch("/speak", {
             method: "POST",
             headers: { "Content-Type": "application/json" },
             body: JSON.stringify({ text: currentGesture })
           });
           btn.textContent = "🔊 Speak Again";
           btn.disabled = false;
         }
         
         function startSSE() {
           const es = new EventSource("/stream");
         
           // ← "init" event was entirely missing — fires on first connect
           es.addEventListener("init", e => {
             const d = JSON.parse(e.data);
             document.getElementById("voiceText").value = d.speech;
             if (d.gesture && !d.gesture.startsWith("Waiting")) showGesture(d.gesture);
             updateBLEStatus(d.ble_status);
             log("Connected to backend stream.");
           });
         
           es.addEventListener("speech", e => {
             const d = JSON.parse(e.data);
             document.getElementById("voiceText").value = d.text;
             log(`Voice: "${d.text}"`);                    // ← was missing
           });
         
           es.addEventListener("gesture", e => {
             const d = JSON.parse(e.data);
             if (d.reset) resetGesture();
             else if (d.text) showGesture(d.text);
           });
         
           es.addEventListener("ble_status", e => {
             updateBLEStatus(JSON.parse(e.data).status);
             // log() already called inside updateBLEStatus
           });
         
           es.onerror = () => log("Connection lost — retrying…");
         }
         
         startSSE();
         log("System initialized.");
      </script>
   </body>
</html>
